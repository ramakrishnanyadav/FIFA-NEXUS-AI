name: FIFA Nexus AI CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: postgres_test_password
          POSTGRES_DB: fifanexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff bandit pip-audit pre-commit

      - name: Run Pre-commit Hooks (lint gate)
        run: pre-commit run --all-files

      - name: Run Ruff Linter
        run: ruff check backend/app

      - name: Run Bandit Security Audit
        run: bandit -r backend/app -x backend/app/tests

      - name: Run Dependency Audit
        run: pip-audit || echo "Warning: pip-audit found issues (non-blocking in dev venv)"

      - name: Run Tests with Coverage
        env:
          ENVIRONMENT: development
          PYTHONPATH: .
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: postgres_test_password
          POSTGRES_DB: fifanexus
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          API_KEY: fifanexus_api_key_2026
        run: |
          pytest --cov=backend/app --cov-branch --cov-report=xml --cov-report=html backend/tests/

      - name: Upload Coverage Results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
