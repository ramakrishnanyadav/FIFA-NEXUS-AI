name: FIFA Nexus AI CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: postgres_test_password
          POSTGRES_DB: fifanexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff bandit

      - name: Run Ruff Linter
        run: ruff check backend/app

      - name: Run Bandit Security Audit
        run: bandit -r backend/app -x backend/app/tests

      - name: Run Tests with Coverage
        env:
          ENVIRONMENT: development
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: postgres_test_password
          POSTGRES_DB: fifanexus
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          API_KEY: fifanexus_api_key_2026
          JWT_SECRET_KEY: nexus_jwt_dev_secret_2026_changeme_in_production
        run: |
          pytest --cov=backend/app --cov-report=xml --cov-report=html backend/tests/

      - name: Upload Coverage Results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
