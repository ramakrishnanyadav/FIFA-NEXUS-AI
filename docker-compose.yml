version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fifa-nexus-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fifanexus
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=postgres_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fifanexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fifa-nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: fifa-nexus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-inference:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fifa-nexus-ml-inference
    command: python -m ml.src.inference
    ports:
      - "8001:8001"
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fifa-nexus-backend
    command: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fifanexus
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=postgres_pass
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - ML_SERVICE_URL=http://ml-inference:8001/predict
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
